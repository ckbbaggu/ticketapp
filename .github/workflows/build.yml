name: Spring Boot CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: chetankumaarbagaria

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build Application
        run: mvn clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticketapp-jar
          path: target/*.jar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t YOUR_DOCKER_USERNAME/ticketapp8:latest .

      - name: Push Docker Image
        run: docker push YOUR_DOCKER_USERNAME/ticketapp8:latest

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME/ticketapp8:latest .

      - name: Push Docker Image
        run: docker push $IMAGE_NAME/ticketapp8:latest