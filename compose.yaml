services:

  postgres:
    image: postgres:16
    container_name: ticket-postgres

    environment:
      POSTGRES_DB: ticketdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .

    container_name: ticketapp8

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/ticketdb
      DB_USERNAME: postgres
      DB_PASSWORD: password

    depends_on:
      - postgres

volumes:
  postgres-data: